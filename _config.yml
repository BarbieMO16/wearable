title: Wearable
description: Repositorio base para enseñar y crear documentación en GitHub Pages con Just the Docs
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

url: "https://barbiemo16.github.io/"
baseurl: "/wearable"

just_the_docs:
  custom_css:
    - "assets/css/custom.css"
  footer_content: ""

# ✅ ESTA ES LA LÍNEA MÁGICA:
nav_enabled: false

search_enabled: true
search:
  heading_level: 2

aux_links:
  "Repositorio en GitHub":
    - "https://github.com/barbiemo16/wearable"

permalink: pretty
exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor"
